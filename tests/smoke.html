<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SUI Smoke Tests</title>
  <link rel="stylesheet" href="../dist/sui-tokens.min.css">
  <link rel="stylesheet" href="../dist/sui-components.min.css">
  <link rel="stylesheet" href="../dist/sui-icons.min.css">
  <script src="../dist/sui.min.js" defer></script>
  <style>
    body { font-family: var(--sui-font-primary); padding: var(--sui-space-4); background: var(--sui-bg-primary); color: var(--sui-text-primary); }
    h1 { font-size: var(--sui-text-h2); margin-bottom: var(--sui-space-3); }
    .smoke-results { margin-top: var(--sui-space-3); }
    .smoke-row { display: flex; align-items: center; gap: var(--sui-space-2); padding: var(--sui-space-2) 0; border-bottom: 1px solid var(--sui-border); }
    .smoke-row[data-result="pass"] .smoke-status { color: var(--sui-success-strong); }
    .smoke-row[data-result="fail"] .smoke-status { color: var(--sui-error-strong); }
    .smoke-row[data-result="skip"] .smoke-status { color: var(--sui-text-muted); }
    .smoke-status { font-weight: var(--sui-weight-bold); min-width: 50px; }
    .smoke-name { flex: 1; }
    .smoke-detail { color: var(--sui-text-muted); font-size: var(--sui-text-small); }
    .smoke-summary { margin-top: var(--sui-space-3); padding: var(--sui-space-3); border-radius: var(--sui-radius-md); font-weight: var(--sui-weight-bold); font-size: var(--sui-text-h3); }
    .smoke-summary.is-pass { background: var(--sui-success-soft); color: var(--sui-success-strong); }
    .smoke-summary.is-fail { background: var(--sui-error-soft); color: var(--sui-error-strong); }
    #smoke-fixtures { position: absolute; left: -9999px; top: -9999px; width: 1px; height: 1px; overflow: hidden; }
  </style>
</head>
<body>
  <h1>SUI Smoke Tests</h1>
  <p>Version: <span id="smoke-version">&mdash;</span> | Tests: <span id="smoke-count">&mdash;</span> | Status: <span id="smoke-status">Pending</span></p>
  <button class="sui-btn sui-btn-primary" type="button" id="smoke-run" data-test="run-btn">Run Checks</button>

  <div class="smoke-results" id="smoke-results" data-test="results"></div>
  <div id="smoke-summary" data-test="summary"></div>

  <!-- ===== TEST FIXTURES (off-screen) ===== -->
  <div id="smoke-fixtures">

    <!-- Modal: native dialog with .sui-modal-close -->
    <dialog class="sui-dialog" id="test-modal-class" aria-label="Test modal class close" data-test="modal-class">
      <div class="sui-modal-header">
        <span class="sui-modal-title">Test Modal (class)</span>
        <button class="sui-modal-close" type="button" aria-label="Close" data-test="modal-class-close">&times;</button>
      </div>
      <div class="sui-modal-body"><p>Test content</p></div>
      <div class="sui-modal-footer">
        <button class="sui-btn sui-btn-ghost" type="button" data-sui-modal-close data-test="modal-class-footer-close">Cancel</button>
      </div>
    </dialog>

    <!-- Modal: native dialog with [data-sui-modal-close] only -->
    <dialog class="sui-dialog" id="test-modal-data" aria-label="Test modal data-attr close" data-test="modal-data">
      <div class="sui-modal-header">
        <span class="sui-modal-title">Test Modal (data-attr)</span>
        <button data-sui-modal-close type="button" aria-label="Close" data-test="modal-data-close">&times;</button>
      </div>
      <div class="sui-modal-body"><p>Test content</p></div>
    </dialog>

    <!-- Panel -->
    <div class="sui-panel" id="test-panel" aria-label="Test panel" aria-hidden="true" data-test="panel">
      <div class="sui-panel-header">
        <span>Test Panel</span>
        <button class="sui-panel-close" type="button" aria-label="Close panel" data-test="panel-close">&times;</button>
      </div>
      <div class="sui-panel-body"><p>Panel content</p></div>
    </div>

    <!-- Dropdown -->
    <div class="sui-dropdown" data-test="dropdown">
      <button class="sui-btn" type="button" data-sui-dropdown-trigger data-test="dropdown-trigger">Menu</button>
      <div class="sui-dropdown-menu" role="menu">
        <button class="sui-dropdown-item" role="menuitem">Item 1</button>
        <button class="sui-dropdown-item" role="menuitem">Item 2</button>
      </div>
    </div>

    <!-- Accordion -->
    <div class="sui-accordion" data-test="accordion">
      <button class="sui-accordion-trigger" type="button" aria-expanded="false" data-test="accordion-trigger">Section</button>
      <div class="sui-accordion-panel" hidden data-test="accordion-panel">Content</div>
    </div>

    <!-- Tabs -->
    <div data-test="tabs">
      <nav class="sui-nav" role="tablist" aria-label="Test tabs" data-test="tabs-nav">
        <button class="sui-tab is-active" role="tab" aria-selected="true" data-tab="tab-a" data-test="tab-a">Tab A</button>
        <button class="sui-tab" role="tab" aria-selected="false" data-tab="tab-b" data-test="tab-b">Tab B</button>
      </nav>
      <div data-view="tab-a" class="is-active" role="tabpanel" aria-label="Tab A panel" data-test="panel-a">Content A</div>
      <div data-view="tab-b" role="tabpanel" aria-label="Tab B panel" data-test="panel-b">Content B</div>
    </div>

    <!-- Theme toggle -->
    <button data-sui-theme type="button" data-test="theme-toggle">Toggle theme</button>

    <!-- Tooltip -->
    <span class="sui-tooltip" data-test="tooltip">
      Hover me
      <span class="sui-tooltip-content" role="tooltip">Tooltip text</span>
    </span>

    <!-- Segmented control -->
    <div class="sui-segmented" data-test="segmented" role="radiogroup" aria-label="Test segmented">
      <button class="sui-segment" role="radio" aria-checked="true" data-test="seg-a">Option A</button>
      <button class="sui-segment" role="radio" aria-checked="false" data-test="seg-b">Option B</button>
    </div>

  </div>

  <script>
    /* ─── SUI Smoke Test Runner ───────────────────────── */
    (function () {
      'use strict';

      const tests = [];
      const $ = s => document.querySelector(s);
      const $$ = s => document.querySelectorAll(s);

      function assert(id, name, fn) {
        tests.push({ id, name, fn });
      }

      function delay(ms) {
        return new Promise(r => setTimeout(r, ms));
      }

      /* ── Core ── */

      assert('sui-loaded', 'SUI global exists', () => {
        return typeof window.SUI === 'object' && SUI !== null;
      });

      assert('sui-init', 'SUI.init is callable', () => {
        return typeof SUI.init === 'function';
      });

      /* ── Modal ── */

      assert('modal-open', 'Modal opens via SUI.modal.open()', async () => {
        const dialog = $('#test-modal-class');
        SUI.modal.open(dialog);
        await delay(50);
        const opened = dialog.open === true;
        SUI.modal.close(dialog);
        await delay(50);
        return opened;
      });

      assert('modal-close-class', 'Modal closes via .sui-modal-close click', async () => {
        const dialog = $('#test-modal-class');
        SUI.modal.open(dialog);
        await delay(50);
        $('[data-test="modal-class-close"]').click();
        await delay(50);
        return dialog.open === false;
      });

      assert('modal-close-data', 'Modal closes via [data-sui-modal-close] click', async () => {
        const dialog = $('#test-modal-data');
        SUI.modal.open(dialog);
        await delay(50);
        $('[data-test="modal-data-close"]').click();
        await delay(50);
        return dialog.open === false;
      });

      assert('modal-close-footer', 'Footer [data-sui-modal-close] closes nearest dialog', async () => {
        const dialog = $('#test-modal-class');
        SUI.modal.open(dialog);
        await delay(50);
        $('[data-test="modal-class-footer-close"]').click();
        await delay(50);
        return dialog.open === false;
      });

      assert('modal-inert-cleanup', 'No stale [inert] after modal close', async () => {
        const dialog = $('#test-modal-class');
        SUI.modal.open(dialog);
        await delay(50);
        SUI.modal.close(dialog);
        await delay(50);
        return document.querySelectorAll('[inert]').length === 0;
      });

      assert('modal-double-close', 'Double-close on closed dialog is safe', () => {
        const dialog = $('#test-modal-class');
        try {
          SUI.modal.close(dialog);
          return true;
        } catch (e) {
          return false;
        }
      });

      /* ── Panel ── */

      assert('panel-open-close', 'Panel opens and closes', async () => {
        const panel = $('#test-panel');
        SUI.panel.open(panel);
        await delay(100);
        const opened = panel.classList.contains('is-open');
        SUI.panel.close(panel);
        await delay(100);
        const closed = !panel.classList.contains('is-open');
        return opened && closed;
      });

      /* ── Dropdown ── */

      assert('dropdown-open-close', 'Dropdown opens and closes programmatically', async () => {
        const dd = $('[data-test="dropdown"]');
        SUI.dropdown.open(dd);
        await delay(50);
        const opened = dd.classList.contains('is-open');
        SUI.dropdown.close(dd);
        await delay(50);
        const closed = !dd.classList.contains('is-open');
        return opened && closed;
      });

      /* ── Accordion ── */

      assert('accordion-toggle', 'Accordion toggle works', async () => {
        const trigger = $('[data-test="accordion-trigger"]');
        SUI.accordion.toggle(trigger);
        await delay(50);
        const expanded = trigger.getAttribute('aria-expanded') === 'true';
        SUI.accordion.toggle(trigger);
        await delay(50);
        const collapsed = trigger.getAttribute('aria-expanded') === 'false';
        return expanded && collapsed;
      });

      /* ── Tabs ── */

      assert('tabs-switch', 'Tab switching works', async () => {
        const tabB = $('[data-test="tab-b"]');
        const panelB = $('[data-test="panel-b"]');
        SUI.tabs.activate(tabB);
        await delay(50);
        const switched = tabB.getAttribute('aria-selected') === 'true' && panelB.classList.contains('is-active');
        SUI.tabs.activate($('[data-test="tab-a"]'));
        await delay(50);
        return switched;
      });

      /* ── Theme ── */

      assert('theme-toggle', 'Theme toggle changes mode', () => {
        const before = SUI.theme.resolved();
        SUI.theme.toggle();
        const after = SUI.theme.resolved();
        SUI.theme.toggle();
        return before !== after;
      });

      /* ── Toast ── */

      assert('toast-show', 'Toast show() creates alert element', async () => {
        const el = SUI.toast.show({ title: 'Test', message: 'Smoke test', type: 'info', duration: 0 });
        await delay(50);
        const exists = el && el.classList.contains('sui-toast');
        const hasRole = el && el.getAttribute('role') === 'alert';
        if (el && el.parentNode) el.parentNode.removeChild(el);
        return exists && hasRole;
      });

      assert('toast-success', 'Toast convenience: success()', async () => {
        const el = SUI.toast.success('OK', 'It worked');
        await delay(50);
        const ok = el && el.classList.contains('sui-toast-success');
        if (el && el.parentNode) el.parentNode.removeChild(el);
        return ok;
      });

      assert('toast-error-assertive', 'Toast error() uses aria-live assertive', async () => {
        const el = SUI.toast.error('Failed');
        await delay(50);
        const ok = el && el.classList.contains('sui-toast-error');
        const assertive = el && el.getAttribute('aria-live') === 'assertive';
        if (el && el.parentNode) el.parentNode.removeChild(el);
        return ok && assertive;
      });

      assert('toast-xss', 'Toast title/message are XSS safe (textContent)', async () => {
        const xss = '<img src=x onerror=alert(1)>';
        const el = SUI.toast.show({ title: xss, message: xss, type: 'info', duration: 0 });
        await delay(50);
        const titleEl = el.querySelector('.sui-toast-title');
        const msgEl = el.querySelector('.sui-toast-message');
        const titleSafe = titleEl && !titleEl.innerHTML.includes('<img');
        const msgSafe = msgEl && !msgEl.innerHTML.includes('<img');
        if (el && el.parentNode) el.parentNode.removeChild(el);
        return titleSafe && msgSafe;
      });

      assert('toast-type-guard', 'Toast rejects unknown type strings', async () => {
        const el = SUI.toast.show({ title: 'Test', type: 'evil', duration: 0 });
        await delay(50);
        const safe = el && el.classList.contains('sui-toast-info');
        if (el && el.parentNode) el.parentNode.removeChild(el);
        return safe;
      });

      assert('toast-close-btn', 'Toast close button dismisses', async () => {
        const el = SUI.toast.show({ title: 'Dismiss me', duration: 0 });
        await delay(50);
        const closeBtn = el.querySelector('.sui-toast-close');
        closeBtn.click();
        await delay(400);
        return !document.body.contains(el);
      });

      /* ── Tooltip ── */

      assert('tooltip-show-hide', 'Tooltip show/hide works', async () => {
        const el = $('[data-test="tooltip"]');
        SUI.tooltip.show(el);
        await delay(50);
        const shown = el.classList.contains('is-tooltip-visible');
        SUI.tooltip.hide(el);
        await delay(50);
        const hidden = !el.classList.contains('is-tooltip-visible');
        return shown && hidden;
      });

      /* ── Segmented ── */

      assert('segmented-switch', 'Segmented control switches active segment', async () => {
        const segB = $('[data-test="seg-b"]');
        const segA = $('[data-test="seg-a"]');
        segB.click();
        await delay(50);
        const switched = segB.getAttribute('aria-checked') === 'true' &&
                         segA.getAttribute('aria-checked') === 'false';
        segA.click();
        await delay(50);
        return switched;
      });

      /* ── Copy utility ── */

      assert('copy-api', 'SUI.copy module has text() and fromElement()', () => {
        return typeof SUI.copy === 'object' &&
               typeof SUI.copy.text === 'function' &&
               typeof SUI.copy.fromElement === 'function';
      });

      /* ── Destroy / re-init lifecycle ── */

      assert('tabs-destroy', 'Tabs destroy() clears init flag, re-init works', async () => {
        const nav = $('[data-test="tabs-nav"]');
        SUI.tabs.destroy(nav);
        const destroyed = !nav._suiInit;
        SUI.tabs.init(nav);
        const reinit = !!nav._suiInit;
        const tabB = $('[data-test="tab-b"]');
        SUI.tabs.activate(tabB);
        await delay(50);
        const works = tabB.getAttribute('aria-selected') === 'true';
        SUI.tabs.activate($('[data-test="tab-a"]'));
        await delay(50);
        return destroyed && reinit && works;
      });

      assert('accordion-destroy', 'Accordion destroy() clears init flag', () => {
        const container = $('[data-test="accordion"]');
        SUI.accordion.destroy(container);
        const destroyed = !container._suiInit;
        SUI.accordion.init(container);
        return destroyed && !!container._suiInit;
      });

      /* ── Idempotency ── */

      assert('idempotent-init', 'Double init() does not duplicate handlers', async () => {
        const nav = $('[data-test="tabs-nav"]');
        SUI.tabs.init(nav); // Already initialised — should be no-op
        const tabB = $('[data-test="tab-b"]');
        SUI.tabs.activate(tabB);
        await delay(50);
        const ok = tabB.getAttribute('aria-selected') === 'true';
        SUI.tabs.activate($('[data-test="tab-a"]'));
        await delay(50);
        return ok;
      });

      /* ── Runner ── */

      async function run() {
        const resultsEl = $('#smoke-results');
        const summaryEl = $('#smoke-summary');
        const statusEl = $('#smoke-status');
        const versionEl = $('#smoke-version');
        const countEl = $('#smoke-count');
        const started = new Date().toISOString();

        const version = (typeof SUI !== 'undefined' && SUI.version) ? SUI.version : 'unknown';
        versionEl.textContent = version;
        countEl.textContent = tests.length;
        statusEl.textContent = 'Running\u2026';
        resultsEl.innerHTML = '';

        const results = [];

        for (const t of tests) {
          let pass = false;
          let details = '';
          try {
            const result = t.fn();
            pass = result instanceof Promise ? await result : result;
            pass = !!pass;
          } catch (e) {
            pass = false;
            details = e.message;
          }

          results.push({ id: t.id, name: t.name, pass, details: details || undefined });

          const row = document.createElement('div');
          row.className = 'smoke-row';
          row.setAttribute('data-result', pass ? 'pass' : 'fail');
          row.setAttribute('data-test', 'row-' + t.id);
          row.innerHTML =
            '<span class="smoke-status">' + (pass ? 'PASS' : 'FAIL') + '</span>' +
            '<span class="smoke-name">' + t.name + '</span>' +
            (details ? '<span class="smoke-detail">' + details + '</span>' : '');
          resultsEl.appendChild(row);
        }

        const allPass = results.every(r => r.pass);
        const finished = new Date().toISOString();

        // DOM flags (contract H1-1)
        document.documentElement.dataset.suiSmoke = allPass ? 'pass' : 'fail';
        document.documentElement.dataset.suiSmokeDone = '1';

        // JS results object (contract H1-2)
        window.__SUI_SMOKE_RESULTS__ = {
          version: version,
          startedAt: started,
          finishedAt: finished,
          pass: allPass,
          total: tests.length,
          passed: results.filter(r => r.pass).length,
          failed: results.filter(r => !r.pass).length,
          tests: results
        };

        // Parseable console line (contract H1-3)
        console.log('[SUI_SMOKE_RESULTS]', JSON.stringify(window.__SUI_SMOKE_RESULTS__));

        // UI summary
        statusEl.textContent = allPass ? 'ALL PASSED' : 'FAILURES DETECTED';
        summaryEl.className = 'smoke-summary ' + (allPass ? 'is-pass' : 'is-fail');
        summaryEl.textContent = results.filter(r => r.pass).length + '/' + results.length + ' passed' + (allPass ? ' \u2713' : ' \u2014 check failures above');
      }

      document.addEventListener('DOMContentLoaded', () => {
        $('#smoke-run').addEventListener('click', run);

        // Autorun (contract H1-4)
        if (new URLSearchParams(window.location.search).get('autorun') === '1') {
          setTimeout(run, 200);
        }
      });
    })();
  </script>
</body>
</html>
